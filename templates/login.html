<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* DaisyUI v4 uses oklch(L C H) channel values — NOT hsl percentages. */
        [data-theme="light"] {
            color-scheme: light;
            --p:  0.55 0.14 152;
            --pf: 0.45 0.12 152;
            --pc: 1 0 0;
            --s:  0.72 0.12 152;
            --sf: 0.62 0.10 152;
            --sc: 1 0 0;
            --a:  0.68 0.14 75;
            --af: 0.58 0.12 75;
            --ac: 1 0 0;
            --n:  0.22 0.03 150;
            --nf: 0.16 0.025 150;
            --nc: 1 0 0;
            --b1: 0.94 0.008 142;   /* Page background */
            --b2: 1.00 0.000 0;     /* Card / panel surface */
            --b3: 0.91 0.012 142;   /* Elevated / input */
            --bc: 0.15 0.03 150;
            --su: 0.52 0.14 152;
            --suc: 1 0 0;
            --er: 0.52 0.18 22;
            --erc: 1 0 0;
            --wa: 0.60 0.14 75;
            --wac: 1 0 0;
            --in: 0.58 0.12 185;
            --inc: 1 0 0;
            --rounded-box:   0.75rem;
            --rounded-btn:   0.5rem;
            --rounded-badge: 0.375rem;
            --border-btn: 1px;
        }
        body, .font-sans {
            font-family: 'Jost', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-base-100 flex items-center justify-center">
    <div class="card bg-base-100 border border-base-300 shadow-lg w-full max-w-sm mx-4">
        <div class="card-body p-8 text-center">

            <!-- Logo mark -->
            <div class="flex justify-center mb-6">
                <img src="/static/SatIcon.svg" alt="Satellite" style="height: 72px; width: 72px;" />
            </div>

            <!-- Wordmark -->
            <div class="flex justify-center mb-1">
                <img src="/static/SatHor.svg" alt="Satellite" style="height: 22px; width: auto;" />
            </div>

            <p class="text-sm text-base-content/50 mb-6">Enter your password to continue</p>

            {% if error %}
            <div class="alert alert-error py-2 text-sm text-left mb-4">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4 text-left">
                <div class="form-control">
                    <label class="label py-1">
                        <span class="label-text text-xs font-medium">Password</span>
                    </label>
                    <input type="password" name="password"
                           class="input input-bordered input-sm w-full"
                           placeholder="••••••••" autofocus required />
                </div>
                <button type="submit" class="btn btn-primary btn-sm w-full mt-2">
                    Sign In
                </button>
            </form>

        </div>
    </div>
</body>
</html>
