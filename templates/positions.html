{% extends "layout.html" %}

{% block title %}Positions — Satellite{% endblock %}

{% block content %}
<div class="page-content">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-2">
            <i class="bi bi-bar-chart-fill text-primary"></i>
            Open Positions
        </h1>
        <button class="btn btn-ghost btn-sm gap-2" onclick="loadPositions()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>

    <!-- Summary stats bar -->
    <div id="positions-summary"></div>

    <!-- Position accordion cards -->
    <div id="positions-container" class="space-y-3"></div>

    <!-- Trade History -->
    <div class="mt-10">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <i class="bi bi-journal-text text-primary"></i>
                Trade History
            </h2>
        </div>
        <div id="trade-history-container">
            <div class="flex justify-center py-8">
                <span class="loading loading-spinner loading-md text-primary"></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/positions.js"></script>
{% endblock %}
