{% extends "layout.html" %}

{% block title %}Positions — Alpaca Trading{% endblock %}

{% block content %}
<div class="page-content">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-2">
            <i class="bi bi-bar-chart-fill text-primary"></i>
            Open Positions
        </h1>
        <button class="btn btn-ghost btn-sm gap-2" onclick="loadPositions()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>

    <!-- Summary stats bar -->
    <div id="positions-summary"></div>

    <!-- Position accordion cards -->
    <div id="positions-container" class="space-y-3"></div>

    <!-- Bot Status & Action Log -->
    <div class="mt-10">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <i class="bi bi-robot text-primary"></i>
                Autonomous Bot
            </h2>
            <div class="flex items-center gap-2">
                <button id="bot-pause-btn" class="btn btn-xs btn-ghost gap-1" onclick="toggleBotHalt()">
                    <i class="bi bi-pause-circle"></i> <span id="bot-pause-label">Pause</span>
                </button>
                <button class="btn btn-xs btn-ghost gap-1" onclick="loadBotStatus()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
        </div>
        <div id="bot-status-container">
            <div class="flex justify-center py-6">
                <span class="loading loading-spinner loading-md text-primary"></span>
            </div>
        </div>

        <!-- Action Log -->
        <div class="mt-6">
            <h3 class="text-sm font-semibold text-base-content/70 mb-3 flex items-center gap-2">
                <i class="bi bi-list-ul"></i> Recent Bot Actions
            </h3>
            <div id="bot-actions-container">
                <div class="flex justify-center py-4">
                    <span class="loading loading-spinner loading-sm text-primary"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Trade History -->
    <div class="mt-10">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <i class="bi bi-journal-text text-primary"></i>
                Trade History
            </h2>
        </div>
        <div id="trade-history-container">
            <div class="flex justify-center py-8">
                <span class="loading loading-spinner loading-md text-primary"></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/positions.js"></script>
{% endblock %}
