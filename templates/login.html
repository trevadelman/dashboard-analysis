<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpaca AI Bot — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid #dde1e7;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .login-icon {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 8px;
        }
        .form-control {
            background-color: #f7f8fa;
            border: 1px solid #dde1e7;
            color: #2c3e50;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: #3498db;
            color: #2c3e50;
            box-shadow: none;
        }
        .btn-primary {
            background-color: #3498db;
            border-color: #3498db;
        }
        .btn-primary:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="login-icon"><i class="bi bi-cpu-fill"></i></div>
        <h4 class="mb-1 fw-semibold" style="color: #2c3e50;">Alpaca AI Bot</h4>
        <p class="text-muted small mb-4">Enter your password to continue</p>

        {% if error %}
        <div class="alert alert-danger py-2 small text-start">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3 text-start">
                <label class="form-label small text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>
</body>
</html>
